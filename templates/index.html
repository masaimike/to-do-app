<!DOCTYPE html>
<html>
<head><title>To-Do List</title></head>
<body>
    <h1>To-Do List</h1>
    <form action="/add" method="post">
        <input type="text" name="task" placeholder="New task" required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for id, task in tasks %}
            <li>{{ task }} — <a href="/delete/{{ id }}">delete</a></li>
        {% endfor %}
    </ul>
</body>
</html>
